version: 2
project_name: jenkins-job-cli

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.build={{.ShortCommit}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: jenkins-job-cli

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README*
      - LICENSE*
      - CHANGELOG*
    wrap_in_directory: false

checksum:
  name_template: "checksums.txt"

# snapshot:
  # name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: jeffzhangc
    name: jenkins-job-cli
  
  # 简化的发布说明，避免使用可能不存在的变量
  header: |
    ## Release {{ .Tag }}
    
    Jenkins Job CLI tool for managing Jenkins jobs programmatically.
  
  footer: |
    ### Installation
    
    **Using Homebrew:**
    ```bash
    brew install jeffzhangc/tap/jenkins-job-cli
    ```
    
    **Manual installation:**
    Download the binary for your platform from the Assets section below.
    
    ### Usage
    ```bash
    jj --help
    ```

# Homebrew Tap 配置
brews:
  - name: jenkins-job-cli
    repository:
      owner: jeffzhangc
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    
    directory: Formula
    homepage: "https://github.com/jeffzhangc/jenkins-job-cli"
    description: "Jenkins job CLI tool"
    license: "MIT"
    
    # 添加多架构支持
    url_template: "https://github.com/jeffzhangc/jenkins-job-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

    install: |
      bin.install "jenkins-job-cli"
      bin.install_symlink "jenkins-job-cli" => "jj"
    
    test: |
      system "#{bin}/jenkins-job-cli --version"
      system "#{bin}/jj --version"
    
    caveats: "You can use either 'jenkins-job-cli' or 'jj' command"
    
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com